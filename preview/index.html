<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CONECTA URP · Preview Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script src="./data.js"></script>
<style>
  :root { --brand:#0F6CBD; --brand-dark:#0A4E8A; --ink:#242424; --muted:#616161; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Segoe UI',system-ui,sans-serif; background:#FAFAFA; color:var(--ink); }
  header { background:#fff; border-bottom:1px solid #e5e5e5; padding:0 24px; height:56px;
           display:flex; align-items:center; gap:8px; position:sticky; top:0; z-index:5; }
  header .logo { color:var(--brand); font-weight:600; }
  header .sub { color:var(--muted); font-size:12px; }
  main { max-width:1200px; margin:0 auto; padding:24px; }
  .card { background:#fff; border:1px solid #e5e5e5; border-radius:8px;
          box-shadow:0 1px 2px rgba(0,0,0,.05); }
  .filters { padding:16px; display:flex; flex-wrap:wrap; gap:12px; align-items:end; margin-bottom:16px; }
  .filters .f { display:flex; flex-direction:column; gap:4px; }
  .filters label { font-size:11px; text-transform:uppercase; color:var(--muted); font-weight:600; }
  .filters select { border:1px solid #d0d0d0; border-radius:6px; padding:6px 8px; font-size:14px; background:#fff; min-width:150px; }
  .clear { margin-left:auto; color:var(--brand); background:none; border:none; cursor:pointer; font-size:14px; }
  .summary { font-size:14px; color:var(--muted); margin:4px 0 16px; }
  .summary b { color:var(--ink); }
  .kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
  .kpi { padding:16px; min-height:104px; display:flex; flex-direction:column; justify-content:space-between; }
  .kpi .t { font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); font-weight:600; }
  .kpi .v { font-size:30px; font-weight:600; color:var(--brand); line-height:1.1; }
  .kpi .d { font-size:11px; color:var(--muted); }
  .charts { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .chart { padding:16px; }
  .chart h3 { font-size:14px; margin:0 0 8px; }
  .badge { background:#EFF6FC; color:var(--brand); font-size:11px; padding:2px 8px; border-radius:999px; margin-left:8px; }
  @media(max-width:1000px){ .kpis{grid-template-columns:repeat(2,1fr);} .charts{grid-template-columns:1fr;} }

  .ms { position:relative; }
  .ms-btn { border:1px solid #d0d0d0; border-radius:6px; padding:6px 8px; font-size:14px; background:#fff;
            min-width:170px; max-width:240px; display:flex; justify-content:space-between; align-items:center; gap:6px; cursor:pointer; }
  .ms-btn .ph { color:#9ca3af; }
  .ms-pop { position:absolute; z-index:20; margin-top:4px; width:250px; max-height:260px; overflow:auto;
            background:#fff; border:1px solid #e5e5e5; border-radius:6px; box-shadow:0 6px 20px rgba(0,0,0,.12); padding:4px 0; }
  .ms-pop label { display:flex; gap:8px; align-items:center; padding:6px 12px; font-size:14px; cursor:pointer; }
  .ms-pop label:hover { background:#f7f7f7; }
  .ms-chips { display:flex; flex-wrap:wrap; gap:4px; max-width:240px; margin-top:4px; }
  .chip { background:#EFF6FC; color:var(--brand); font-size:11px; border-radius:4px; padding:1px 6px; display:inline-flex; gap:4px; align-items:center; }
  .chip button { border:none; background:none; color:var(--brand); cursor:pointer; padding:0; font-size:12px; line-height:1; }
</style>
</head>
<body>
<header>
  <span class="logo">📊 CONECTA URP</span>
  <span class="sub">· Analítica de Egresados 2025</span>
  <span class="badge">PREVIEW · datos reales · sin backend</span>
</header>
<main>
  <div class="card filters" id="filters"></div>
  <div class="summary" id="summary"></div>
  <div class="kpis" id="kpis"></div>
  <div class="card chart" style="margin-bottom:16px"><h3>Tasa de empleo por año de egreso</h3><div id="anio" style="height:280px"></div></div>
  <div class="charts">
    <div class="card chart"><h3>% Distribución por Rubro</h3><div id="rubro" style="height:320px"></div></div>
    <div class="card chart"><h3>% Distribución por Cargo</h3><div id="cargo" style="height:320px"></div></div>
  </div>
</main>

<script>
const D = window.CONECTA;
let F = {}; // filtros activos

// ---- misma lógica del DashboardService ----
function inSet(sel,v){ return !sel || sel.length===0 || sel.map(String).includes(String(v)); }
function match(r){
  return inSet(F.ae,r.ae)&&inSet(F.fa,r.fa)&&inSet(F.es,r.es)&&
         inSet(F.ru,r.ru)&&inSet(F.nc,r.nc)&&inSet(F.te,r.te)&&inSet(F.ti,r.ti);
}
const pct=(n,d)=> d>0 ? n/d : 0;
const fmtPct=v=>(v*100).toFixed(1)+'%';

function computeKpis(rows){
  const emp=rows.filter(r=>r.tr===1);
  const N=rows.length, E=emp.length;
  const privT=emp.filter(r=>r.te==='PRIVADA').length;
  const privS=emp.filter(r=>r.tp==='PRIVADA').length;
  const adec=emp.filter(r=>r.co==='TOTALMENTE'||r.co==='MUCHO').length;
  const sats=emp.map(r=>r.sa).filter(x=>x!=null);
  const satProm=sats.length? sats.reduce((a,b)=>a+b,0)/sats.length : 0;
  const conT=emp.filter(r=>r.ti!=null).length;
  const m6=emp.filter(r=>['MENOS_3M','ENTRE_3_6M'].includes(r.ti)).length;
  const m12=emp.filter(r=>['MENOS_3M','ENTRE_3_6M','ENTRE_6_12M'].includes(r.ti)).length;
  const empr=rows.filter(r=>r.ng===1).length;
  return {N,E,list:[
    {t:'Tasa de empleo',v:pct(E,N)},
    {t:'Empleo formal (privada)',v:pct(privT,E)},
    {t:'Sector privado',v:pct(privS,E)},
    {t:'Adecuación profesional',v:pct(adec,E)},
    {t:'Satisfacción laboral',v:satProm/5,d:satProm.toFixed(2)+' / 5'},
    {t:'Empleo < 6 meses',v:pct(m6,conT)},
    {t:'Empleo < 12 meses',v:pct(m12,conT)},
    {t:'Tasa de emprendimiento',v:pct(empr,N),d:empr+' con negocio'},
  ]};
}
function distribucion(rows,key,labelMap){
  const emp=rows.filter(r=>r.tr===1 && r[key]!=null);
  const cnt={};
  emp.forEach(r=>cnt[r[key]]=(cnt[r[key]]||0)+1);
  const tot=emp.length;
  return Object.entries(cnt).map(([k,c])=>({
    categoria:labelMap[k]||k, cantidad:c, porcentaje:pct(c,tot)
  })).sort((a,b)=>a.porcentaje-b.porcentaje);
}

// ---- render ----
const rubroMap=Object.fromEntries(D.rubros.map(r=>[r.id,r.nombre]));
const nivelMap=Object.fromEntries(D.niveles.map(n=>[n.id,n.nombre]));
const cAnio=echarts.init(document.getElementById('anio'));
const cRubro=echarts.init(document.getElementById('rubro'));
const cCargo=echarts.init(document.getElementById('cargo'));

function lineOption(serie){
  return {
    grid:{left:8,right:20,top:20,bottom:24,containLabel:true},
    tooltip:{trigger:'axis',formatter:p=>{const d=serie[p[0].dataIndex];return `Egreso ${d.anio}<br/><b>${fmtPct(d.tasa)}</b> empleo · ${d.empleados}/${d.total}`;}},
    xAxis:{type:'category',data:serie.map(d=>d.anio),boundaryGap:false},
    yAxis:{type:'value',max:1,axisLabel:{formatter:v=>(v*100).toFixed(0)+'%'}},
    series:[{type:'line',smooth:true,data:serie.map(d=>d.tasa),itemStyle:{color:'#0F6CBD'},
      areaStyle:{color:'rgba(15,108,189,0.08)'},label:{show:true,formatter:p=>(p.value*100).toFixed(0)+'%',fontSize:10,color:'#616161'}}]
  };
}
function barOption(data){
  return {
    grid:{left:8,right:56,top:8,bottom:8,containLabel:true},
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'},
      formatter:p=>{const d=data[p[0].dataIndex];return `${d.categoria}<br/><b>${fmtPct(d.porcentaje)}</b> · ${d.cantidad} egresados`;}},
    xAxis:{type:'value',axisLabel:{formatter:v=>(v*100).toFixed(0)+'%'}},
    yAxis:{type:'category',data:data.map(d=>d.categoria),axisTick:{show:false}},
    series:[{type:'bar',data:data.map(d=>d.porcentaje),
      itemStyle:{color:'#0F6CBD',borderRadius:[0,4,4,0]},barMaxWidth:22,
      label:{show:true,position:'right',formatter:p=>fmtPct(p.value),color:'#616161',fontSize:11}}]
  };
}

function render(){
  const rows=D.rows.filter(match);
  const k=computeKpis(rows);
  document.getElementById('summary').innerHTML=
    `<b>${k.N.toLocaleString()}</b> encuestados · <b>${k.E.toLocaleString()}</b> empleados`;
  document.getElementById('kpis').innerHTML=k.list.map(x=>
    `<div class="card kpi"><span class="t">${x.t}</span>
     <div><div class="v">${fmtPct(x.v)}</div>${x.d?`<div class="d">${x.d}</div>`:''}</div></div>`).join('');
  const anios=[...new Set(rows.map(r=>r.ae).filter(x=>x!=null))].sort();
  const serie=anios.map(y=>{const sub=rows.filter(r=>r.ae===y);const e=sub.filter(r=>r.tr===1).length;return{anio:y,tasa:pct(e,sub.length),empleados:e,total:sub.length};});
  cAnio.setOption(lineOption(serie),true);
  const dr=distribucion(rows,'ru',rubroMap), dc=distribucion(rows,'nc',nivelMap);
  cRubro.setOption(barOption(dr),true);
  cCargo.setOption(barOption(dc),true);
}

// ---- filtros (multi-select) ----
const TIEMPO={MENOS_3M:'Menos de 3 meses',ENTRE_3_6M:'Entre 3 y 6 meses',ENTRE_6_12M:'Entre 6 meses y 1 año',ENTRE_1_2A:'Entre 1 y 2 años',MAS_2A:'Más de 2 años'};

const DEFS=[
  {k:'ae',label:'Año egreso',opts:D.anios.map(a=>({v:a,l:String(a)}))},
  {k:'fa',label:'Facultad',opts:D.facultades.map(f=>({v:f,l:f}))},
  {k:'es',label:'Escuela',opts:D.escuelas.map(e=>({v:e.id,l:e.nombre}))},
  {k:'ru',label:'Rubro',opts:D.rubros.map(r=>({v:r.id,l:r.nombre}))},
  {k:'nc',label:'Nivel cargo',opts:D.niveles.map(n=>({v:n.id,l:n.nombre}))},
  {k:'te',label:'Sector',opts:[{v:'PRIVADA',l:'Privada'},{v:'PUBLICA',l:'Pública'}]},
  {k:'ti',label:'Tiempo 1er empleo',opts:Object.entries(TIEMPO).map(([v,l])=>({v,l}))},
];

const cont=document.getElementById('filters');
function draw(){
  cont.innerHTML='';
  DEFS.forEach(def=>{
    const sel=F[def.k]||[];
    const wrap=document.createElement('div'); wrap.className='f';
    const lbl=document.createElement('label'); lbl.textContent=def.label; wrap.appendChild(lbl);
    const ms=document.createElement('div'); ms.className='ms';
    const btn=document.createElement('button'); btn.className='ms-btn';
    btn.innerHTML= sel.length? `<span>${sel.length} seleccionado${sel.length>1?'s':''}</span>` : '<span class="ph">Todos</span>';
    btn.innerHTML+='<span>▾</span>';
    const pop=document.createElement('div'); pop.className='ms-pop'; pop.style.display='none';
    def.opts.forEach(o=>{
      const l=document.createElement('label');
      const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=sel.map(String).includes(String(o.v));
      cb.addEventListener('change',()=>{
        F[def.k]=cb.checked? [...sel,o.v] : sel.filter(x=>String(x)!==String(o.v));
        render(); draw();
      });
      l.appendChild(cb); l.appendChild(document.createTextNode(o.l)); pop.appendChild(l);
    });
    btn.addEventListener('click',e=>{ e.stopPropagation(); document.querySelectorAll('.ms-pop').forEach(p=>{if(p!==pop)p.style.display='none';}); pop.style.display=pop.style.display==='none'?'block':'none'; });
    ms.appendChild(btn); ms.appendChild(pop); wrap.appendChild(ms);
    if(sel.length){
      const chips=document.createElement('div'); chips.className='ms-chips';
      sel.forEach(v=>{
        const o=def.opts.find(x=>String(x.v)===String(v));
        const c=document.createElement('span'); c.className='chip'; c.textContent=(o?o.l:v)+' ';
        const x=document.createElement('button'); x.textContent='×';
        x.addEventListener('click',()=>{ F[def.k]=sel.filter(y=>String(y)!==String(v)); render(); draw(); });
        c.appendChild(x); chips.appendChild(c);
      });
      wrap.appendChild(chips);
    }
    cont.appendChild(wrap);
  });
  const clr=document.createElement('button'); clr.className='clear'; clr.textContent='Limpiar filtros';
  clr.addEventListener('click',()=>{ F={}; render(); draw(); });
  cont.appendChild(clr);
}
document.addEventListener('click',()=>document.querySelectorAll('.ms-pop').forEach(p=>p.style.display='none'));
draw();

window.addEventListener('resize',()=>{cAnio.resize();cRubro.resize();cCargo.resize();});
render();
</script>
</body>
</html>
