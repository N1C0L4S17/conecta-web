# Blueprint de Render: aprovisiona PostgreSQL + API con un clic.
# En Render: New + → Blueprint → conecta este repo → Apply.
databases:
  - name: conecta-db
    databaseName: conecta
    plan: free

services:
  - type: web
    name: conecta-api
    runtime: node
    plan: free
    rootDir: backend
    # db push crea el esquema desde schema.prisma (sin migraciones previas);
    # el seed es idempotente (no recarga si ya hay datos).
    buildCommand: npm install --include=dev && npx prisma generate && npm run build && npx prisma db push --accept-data-loss && npm run seed
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: conecta-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true      # Render genera un secreto seguro
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ORIGIN
        value: "*"               # auth por Bearer token; sin cookies
      - key: NODE_VERSION
        value: "20"
